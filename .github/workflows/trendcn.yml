name: Daily TrendCN Update

on:
  schedule:
    # 每天 UTC 0:00, 6:00, 12:00, 18:00 更新（北京时间 8:00, 14:00, 20:00, 次日2:00）
    - cron: "0 0,6,12,18 * * *"
  workflow_dispatch:  # 手动触发
  push:
    branches: [main]
    paths:
      - "src/**"
      - "main.py"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx beautifulsoup4 lxml

      - name: Fetch and generate
        run: |
          python main.py --since daily
        env:
          BAIDU_APP_ID: ${{ secrets.BAIDU_APP_ID }}
          BAIDU_SECRET_KEY: ${{ secrets.BAIDU_SECRET_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
